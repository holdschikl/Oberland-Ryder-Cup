<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Oberland Ryder Cup — Live Matchplay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-database-compat.min.js"></script>
<style>
  :root{
    --paper:#F4F5F7;
    --paper-2:#E8EBEF;
    --ink:#1B1D22;
    --ink-soft:#5A616C;
    --fairway:#2A2D33;
    --fairway-dark:#131417;
    --brass:#AC8A3E;
    --brass-light:#D8C48C;
    --line:#DCE0E5;
    --teamA:#B30000;
    --teamB:#112C82;
    --danger:#A23B2E;
    --radius:14px;
    --shadow: 0 1px 2px rgba(20,22,26,.06), 0 8px 24px rgba(20,22,26,.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--paper);
    color: var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  #app{
    max-width:560px;
    margin:0 auto;
    padding:16px 16px 64px;
    min-height:100vh;
  }
  h1,h2,h3{font-family:'Inter',sans-serif; font-weight:800; margin:0; letter-spacing:-0.01em;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--brass);
    font-weight:600;
  }
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 2px 4px;
  }
  .topbar .title{
    font-family:'Anton',sans-serif; font-weight:400; font-size:18px; letter-spacing:.01em; text-transform:uppercase;
  }
  .live-pill{
    display:flex; align-items:center; gap:6px;
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft);
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--fairway); animation:pulse 1.8s infinite;}
  .dot.offline{ background:#B8722A; animation:none; }
  .live-pill.offline{ color:#B8722A; font-weight:700; }
  @keyframes pulse{0%{opacity:1}50%{opacity:.25}100%{opacity:1}}
  .refresh-btn{
    background:none;border:1px solid var(--line); border-radius:8px;
    padding:5px 9px; font-size:13px; color:var(--ink-soft);
  }
  .refresh-btn:active{background:var(--paper-2);}
  .session-line{
    display:flex; align-items:center; justify-content:space-between;
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft);
    padding:0 2px 12px; margin-top:-4px;
  }
  .session-line .who{color:var(--fairway); font-weight:600;}
  .logout-btn{background:none; border:none; color:var(--ink-soft); font-size:11px; text-decoration:underline;}

  .card{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:16px; margin-bottom:14px;
  }
  .backlink{
    background:none;border:none;color:var(--fairway); font-weight:600; font-size:14px;
    padding:6px 0; margin-bottom:6px; display:flex; align-items:center; gap:4px;
  }

  .masthead{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:14px 10px; margin-bottom:16px;
  }
  .masthead-flags{ display:flex; align-items:center; justify-content:center; gap:14px; }
  .mh-flag{ width:44px; height:auto; flex-shrink:0; }
  .masthead-titles{ text-align:center; }
  .masthead-title{
    font-family:'Anton',sans-serif; font-weight:400; text-transform:uppercase;
    font-size:25px; line-height:1.02; letter-spacing:.01em; color:var(--ink);
  }
  .masthead-sub{
    font-family:'Inter',sans-serif; font-weight:700; font-size:10.5px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--teamB); text-align:center; margin-top:5px;
  }

  .scorecard{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:16px 16px 14px; margin-bottom:16px;
  }
  .scorecard-eyebrow{
    text-align:center; font-family:'IBM Plex Mono',monospace; font-size:10.5px; font-weight:700;
    letter-spacing:.16em; text-transform:uppercase; color:var(--brass); margin-bottom:10px;
  }
  .score-bar{ display:flex; border-radius:8px; overflow:hidden; }
  .sb-team{
    flex:1; display:flex; align-items:center; padding:11px 12px; color:#fff;
    font-family:'Inter',sans-serif; font-weight:800; font-size:12px; text-transform:uppercase; letter-spacing:.03em;
  }
  .sb-team.a{ background:var(--teamA); justify-content:flex-end; text-align:right; }
  .sb-team.b{ background:var(--teamB); justify-content:flex-start; text-align:left; }
  .sb-num{
    background:#181818; color:#fff; width:52px; flex:0 0 52px;
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:19px;
  }
  .sb-num.a{ border-right:1px solid rgba(255,255,255,.18); }
  .tally{ display:flex; gap:3px; margin-top:24px; position:relative; }
  .tick{ flex:1; height:8px; border-radius:2px; background:var(--paper-2); }
  .win-line{
    position:absolute; top:-5px; bottom:-5px; width:2px;
    background:var(--ink); opacity:.55; z-index:2;
  }
  .win-line-label{
    position:absolute; top:-16px; transform:translateX(-50%);
    font-family:'IBM Plex Mono',monospace; font-size:9px; font-weight:700;
    color:var(--ink-soft); white-space:nowrap; letter-spacing:.02em; z-index:2;
  }
  .tally-caption{
    display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace;
    font-size:10px; color:var(--ink-soft); margin-top:6px;
  }

  .day-tally-row{ display:flex; gap:10px; margin-bottom:16px; }
  .day-tally-card{
    flex:1; background:#fff; border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; text-align:center;
  }
  .dtc-label{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; font-weight:600;
    letter-spacing:.05em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:6px;
  }
  .dtc-score{
    font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:600; margin-bottom:4px;
  }
  .dtc-sub{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft); }
  .yours-card{
    border:1.5px solid var(--fairway); background:#EEF0F3;
  }
  .yours-title{font-size:12px; font-weight:700; color:var(--fairway); margin-bottom:8px; letter-spacing:.02em;}
  .hcp-card{
    background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 14px;
    margin-bottom:12px; display:flex; align-items:center; flex-wrap:wrap; gap:8px;
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft);
  }
  .hcp-card strong{ color:var(--ink); font-size:14px; }
  .hcp-input{
    width:70px; border:1px solid var(--line); border-radius:8px; padding:6px 8px;
    font-family:'IBM Plex Mono',monospace; font-size:13px; background:var(--paper);
  }
  .hcp-save-btn{
    background:var(--fairway); color:#fff; border:none; border-radius:8px;
    padding:6px 12px; font-size:11.5px; font-weight:700; font-family:'Inter',sans-serif;
  }
  .hcp-edit-btn{ background:none; border:none; color:var(--fairway); text-decoration:underline; padding:0; font-family:'Inter',sans-serif; font-size:11.5px; }
  .stf-link-row{ text-align:center; margin:-6px 0 20px; }
  .stf-link-btn{ background:none; border:1px solid var(--line); color:var(--ink); border-radius:20px; padding:8px 16px; font-size:12.5px; font-weight:700; font-family:'Inter',sans-serif; }
  .stf-table{ background:#fff; border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  .stf-row{
    display:grid; grid-template-columns:18px 1fr 28px 36px 36px 40px 38px; align-items:center; gap:3px;
    padding:9px 6px; border-bottom:1px solid var(--line); font-family:'IBM Plex Mono',monospace; font-size:10.5px;
  }
  .stf-row:last-child{ border-bottom:none; }
  .stf-row.stf-header{ background:var(--paper-2); font-weight:700; font-size:8.5px; text-transform:uppercase; color:var(--ink-soft); }
  .stf-rank{ font-weight:700; }
  .stf-name{ display:flex; align-items:center; gap:5px; font-family:'Inter',sans-serif; font-weight:700; font-size:11px; text-transform:uppercase; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .stf-team-dot{ width:8px; height:8px; border-radius:2px; flex-shrink:0; }
  .stf-hcp, .stf-pts, .stf-holes, .stf-diff{ text-align:center; }
  .stf-pts.stf-netto{ font-weight:700; color:var(--fairway); }
  .scorecard-mini{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:12px; }
  .scorecard-mini-label{ font-family:'Inter',sans-serif; font-weight:800; font-size:12.5px; text-align:center; margin-bottom:2px; text-transform:uppercase; letter-spacing:.02em; }
  .scorecard-mini-sub{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft); text-align:center; margin-bottom:12px; }
  .scorecard-total{ text-align:center; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); margin-top:8px; margin-bottom:12px; }
  .scorecard-total strong{ color:var(--ink); font-size:14px; }

  .day-heading{ display:flex; align-items:baseline; justify-content:space-between; margin:20px 2px 8px; }
  .day-heading h2{font-size:17px;}
  .day-heading .sub{font-size:11px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace;}

  .placeholder-card{
    background:var(--paper-2); border:1px dashed var(--line); border-radius:12px;
    padding:16px; text-align:center; color:var(--ink-soft); font-size:13px; margin-bottom:14px;
  }

  .day-table{
    background:#fff; border:1px solid var(--line); border-radius:12px;
    overflow:hidden; margin-bottom:14px;
  }
  .mrow{
    display:grid; grid-template-columns:1fr 64px 1fr; align-items:center; gap:6px;
    padding:12px 10px; border-bottom:1px solid var(--line);
  }
  .mrow:last-child{ border-bottom:none; }
  .mrow:nth-child(even){ background:var(--paper-2); }
  .mrow:active{ background:#DEE2E8; }
  .mrow.mine{ box-shadow: inset 3px 0 0 var(--fairway); }
  .mrow-name{
    font-family:'Inter',sans-serif; font-weight:800; font-size:11.5px; text-transform:uppercase;
    letter-spacing:.01em; line-height:1.3; min-width:0; overflow-wrap:break-word;
  }
  .mrow-name.right{ text-align:right; }
  .mrow-name-line + .mrow-name-line{ margin-top:2px; }
  .mrow-mine-tag{
    display:block; font-family:'IBM Plex Mono',monospace; font-size:8.5px; color:var(--fairway);
    font-weight:700; letter-spacing:.06em; margin-bottom:2px;
  }
  .mrow-center{ display:flex; flex-direction:column; align-items:center; gap:3px; text-align:center; min-width:0; overflow:hidden; }
  .mrow-flag{ width:15px; height:auto; display:block; flex-shrink:0; }
  .mrow-result{ font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:10px; white-space:normal; overflow-wrap:break-word; line-height:1.25; }
  .mrow-result.a{ color:var(--teamA); }
  .mrow-result.b{ color:var(--teamB); }
  .mrow-result.tied{ color:var(--ink-soft); font-weight:600; font-size:9px; }

  .match-header{text-align:center; padding:6px 0 14px;}
  .match-header .side-name{font-family:'Inter',sans-serif; font-size:16.5px; font-weight:800; text-transform:uppercase; letter-spacing:.005em; line-height:1.3;}
  .match-header .side-name .mrow-name-line + .mrow-name-line{ margin-top:1px; }
  .match-header .side-name.a{color:var(--teamA);}
  .match-header .side-name.b{color:var(--teamB);}
  .match-header .vsline{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); margin:4px 0;}
  .big-status{ font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:26px; text-align:center; padding:10px 0 2px; }
  .hole-strip{ display:flex; gap:3px; overflow-x:auto; padding:12px 2px; margin-bottom:6px; justify-content:center; }
  .hole-chip{
    flex:0 0 20px; height:26px; border-radius:5px;
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:600;
    border:1px solid var(--line); color:var(--ink-soft); background:#fff;
  }
  .hole-chip.a{background:var(--teamA); color:#fff; border-color:var(--teamA);}
  .hole-chip.b{background:var(--teamB); color:#fff; border-color:var(--teamB);}
  .hole-chip.h{background:var(--brass); color:#fff; border-color:var(--brass);}
  .hole-chip.next{
    background:var(--fairway); color:#fff; border:1px solid var(--fairway);
    font-weight:800; box-shadow:0 0 0 3px rgba(42,45,51,.18);
  }

  .entry-title{text-align:center; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); margin-bottom:10px;}
  .win-buttons{display:flex; flex-direction:column; gap:8px;}
  .win-btn{
    border:none; border-radius:12px; padding:16px 14px; font-size:15px; font-weight:600;
    color:#fff; display:flex; align-items:center; justify-content:space-between;
  }
  .win-btn:active{filter:brightness(.92);}
  .win-btn.a{background:var(--teamA);}
  .win-btn.b{background:var(--teamB);}
  .win-btn.half{background:var(--brass);}
  .win-btn small{font-family:'IBM Plex Mono',monospace; font-weight:500; opacity:.85; font-size:11px;}
  .view-only-note{
    text-align:center; font-size:12.5px; color:var(--ink-soft); background:var(--paper-2);
    border-radius:10px; padding:12px; font-family:'IBM Plex Mono',monospace;
  }
  .undo-row{display:flex; flex-direction:column; align-items:center; gap:6px; margin-top:12px;}
  .undo-btn{ background:none; border:none; color:var(--danger); font-size:12.5px; text-decoration:underline; padding:8px; font-family:'IBM Plex Mono',monospace;}
  .stroke-block{ margin-bottom:16px; }
  .stroke-block-label{
    font-family:'Inter',sans-serif; font-weight:800; font-size:11.5px; text-transform:uppercase;
    letter-spacing:.02em; margin-bottom:8px; text-align:center;
  }
  .stroke-block-label.a{ color:var(--teamA); }
  .stroke-block-label.b{ color:var(--teamB); }
  .stroke-locked{
    text-align:center; font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:22px;
    background:var(--paper-2); border-radius:10px; padding:12px;
  }
  .stroke-locked.a{ color:var(--teamA); }
  .stroke-locked.b{ color:var(--teamB); }
  .stroke-locked span{
    display:block; font-family:'Inter',sans-serif; font-weight:600; font-size:10px; color:var(--ink-soft);
    text-transform:none; letter-spacing:0; margin-top:3px;
  }
  .stroke-waiting{
    text-align:center; font-size:12px; color:var(--ink-soft); font-style:italic;
    border:1px dashed var(--line); border-radius:10px; padding:14px;
  }
  .stroke-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
  .stroke-btn{
    background:#fff; border:1px solid var(--line); border-radius:8px; padding:12px 0;
    font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:16px; color:var(--ink);
  }
  .stroke-btn:active{ background:var(--fairway); color:#fff; border-color:var(--fairway); }
  .finished-banner{
    text-align:center; font-family:'IBM Plex Mono',monospace; font-size:13px;
    background:var(--paper-2); border-radius:10px; padding:12px; color:var(--ink-soft);
    margin-top:6px;
  }

  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; letter-spacing:.02em;}
  .field select{ width:100%; border:1px solid var(--line); border-radius:10px; padding:11px 12px; font-size:14px; background:#fff; color:var(--ink);}
  .primary-btn{
    width:100%; background:var(--fairway); color:#fff; border:none; border-radius:12px;
    padding:14px; font-size:15px; font-weight:600; margin-top:6px;
  }
  .primary-btn:active{background:var(--fairway-dark);}
  .secondary-btn{
    width:100%; background:#fff; color:var(--fairway); border:1px solid var(--fairway); border-radius:12px;
    padding:12px; font-size:14px; font-weight:600; margin-top:8px;
  }
  .danger-btn{
    width:100%; background:#fff; color:var(--danger); border:1px solid var(--danger); border-radius:12px;
    padding:12px; font-size:13.5px; font-weight:600; margin-top:8px;
  }
  .pairing-row{
    display:grid; grid-template-columns:1fr auto 1fr; gap:8px; align-items:center;
    padding:10px 0; border-bottom:1px solid var(--line);
  }
  .pairing-row:last-child{border-bottom:none;}
  .pairing-vs{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ink-soft); text-align:center;}
  .pairing-row select{width:100%; padding:8px; font-size:12px;}
  .pairing-row .pairslot{display:flex; flex-direction:column; gap:4px;}
  .remove-x{background:none; border:none; color:var(--danger); font-size:16px; padding:0 4px;}
  .add-row-btn{
    width:100%; background:none; border:1px dashed var(--line); border-radius:10px; color:var(--ink-soft);
    padding:9px; font-size:12.5px; margin-top:8px;
  }
  .dice-btn{
    width:100%; background:var(--brass); color:#fff; border:none; border-radius:10px;
    padding:12px; font-size:13.5px; font-weight:700; margin-top:14px;
  }
  .dice-btn:active{ filter:brightness(.93); }
  .helptext{font-size:12px; color:var(--ink-soft); margin-top:-8px; margin-bottom:14px; line-height:1.5;}
  .warn{
    background:#FBF1DC; border:1px solid var(--brass-light); border-radius:10px; padding:10px 12px;
    font-size:12.5px; color:#6B5527; margin-bottom:14px; line-height:1.5;
  }
  .error-banner{
    background:#F7E4DE; border:1px solid var(--danger); color:var(--danger);
    border-radius:10px; padding:10px 12px; font-size:12.5px; margin-bottom:12px;
  }
  .error-detail{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; opacity:.8;
    margin-top:6px; word-break:break-word;
  }
  .center-note{text-align:center; color:var(--ink-soft); font-size:13px; padding:40px 10px;}
  .admin-links{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:26px;}
  .admin-links button{
    background:none; border:none; color:var(--ink-soft); font-size:11.5px; text-decoration:underline;
    font-family:'IBM Plex Mono',monospace;
  }

  /* login */
  .login-wrap{padding-top:10px;}
  .team-group{margin-bottom:16px;}
  .team-group .gh{
    display:flex; align-items:center; gap:8px; font-size:12px; font-weight:700;
    letter-spacing:.04em; text-transform:uppercase; margin-bottom:8px; font-family:'IBM Plex Mono',monospace;
  }
  .team-group .gh .gh-flag{width:16px; height:auto;}
  .name-grid{display:flex; flex-direction:column; gap:6px;}
  .name-btn{
    text-align:left; background:#fff; border:1px solid var(--line); border-radius:10px;
    padding:12px 14px; font-size:14px; font-weight:500; color:var(--ink);
  }
  .name-btn:active{background:var(--paper-2);}
  .admin-entry{text-align:center; margin-top:20px;}
  .admin-entry button{background:none;border:none;color:var(--ink-soft); font-size:12px; text-decoration:underline; font-family:'IBM Plex Mono',monospace;}
  .pin-wrap{text-align:center; padding-top:10px;}
  .pin-wrap .who{font-family:'Inter',sans-serif; font-weight:800; font-size:19px; margin-bottom:4px; text-transform:uppercase;}
  .pin-wrap .sub{font-size:12px; color:var(--ink-soft); margin-bottom:20px; font-family:'IBM Plex Mono',monospace;}
  .pin-input{
    width:160px; margin:0 auto; display:block; text-align:center;
    font-family:'IBM Plex Mono',monospace; font-size:32px; letter-spacing:.4em;
    border:1px solid var(--line); border-radius:12px; padding:14px 10px 14px 16px; background:#fff;
  }
</style>
</head>
<body>
<div id="app"><div class="center-note">Lade Oberland Ryder Cup …</div></div>

<script>
(function(){
  "use strict";

  // ---------- fixed tournament data ----------
  const TOURNAMENT_NAME = "Oberland Ryder Cup";
  const TEAM_A = {key:'riedhof', name:'Riedhof', color:'#B30000'};     // red
  const TEAM_B = {key:'beuerberg', name:'Beuerberg', color:'#112C82'}; // blue
  const DAY1_VENUE = 'Beuerberg';
  const DAY2_VENUE = 'Riedhof';
  // Official per-hole data, Golfclub Beuerberg (golfclub-beuerberg.de/platz/spielbahnen) — Par 74 total.

  function esc(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function fmtPoints(n){
    const whole = Math.floor(n);
    return (n - whole === 0.5) ? (whole === 0 ? '½' : whole + '½') : String(whole);

  function applyError(e, fallback){

  // ---------- storage (Firebase Realtime Database) ----------
  function allMatchIds(){
    const ids = [];
    if (DAY1) DAY1.forEach(m => ids.push(m.id));
    if (DAY2) DAY2.forEach(m => ids.push(m.id));
    return ids;
  }

  }

      return out;

  // Firebase keys can't contain . # $ [ ] / — player names can (e.g. quotes, "Sr.", "CEP/Magic").
  function safeKey(s){
    return encodeURIComponent(s).replace(/\./g, '%2E');
  }
  async function saveMyHcp(value){
    await db.ref('player_hcp/' + safeKey(CURRENT_USER.name)).set({name: CURRENT_USER.name, hcp: value});
  }

  // ---------- Stableford (Einzel / Tag 2 only) ----------
  function strokesReceivedAtHole(hcp, strokeIndex){
    if (hcp == null) return 0;
    const base = Math.floor(hcp / 18);
    const extra = (hcp % 18) >= strokeIndex ? 1 : 0;
    return base + extra;
  }
  function computeStableford(strokesArr, course, hcp){
    if (!course || !course.holes) return {brutto:null, netto:null, holesCounted:0};
    let brutto = 0, netto = 0, counted = 0;
    for (let i=0; i<strokesArr.length; i++){
      const s = strokesArr[i];
      if (s == null) continue;
      const par = course.holes[i].par;
      const si = course.holes[i].hcp;
      const grossPts = Math.max(0, 2 - (s - par));
      const received = strokesReceivedAtHole(hcp, si);
      const netPts = Math.max(0, 2 - (s - received - par));
      brutto += grossPts;
      netto += netPts;
      counted++;
    }
    return {brutto, netto, holesCounted: counted};
  }
  // Score Differential (WHS-Kennzahl) — NICHT dieselbe wie eine offizielle Vorgabe-Änderung,
  // da dieses Turnier kein beim DGV gemeldetes "vorgabewirksames" Wettspiel ist. Zeigt nur,
  // wie platzbereinigt gut die Runde war (Baustein einer echten Handicap-Berechnung).
  function computeScoreDifferential(strokesArr, course, hcp){
    if (!course || !course.holes || !course.slope || !course.rating) return null;
    if (hcp == null) return null;
    if (strokesArr.length < 18 || strokesArr.slice(0,18).some(v => v == null)) return null;
    let adjustedGross = 0;
    for (let i=0; i<18; i++){
      const par = course.holes[i].par;
      const si = course.holes[i].hcp;
      const received = strokesReceivedAtHole(hcp, si);
      const netDoubleBogey = par + 2 + received;
      adjustedGross += Math.min(strokesArr[i], netDoubleBogey);
    }
    const diff = (113 / course.slope) * (adjustedGross - course.rating);
    return Math.round(diff * 10) / 10;
  }
  function buildStablefordLeaderboard(){
    const rows = [];
    if (DAY2){
      DAY2.forEach(m => {
        const holes = (MATCHES[m.id] || {}).holes || [];
        ['a','b'].forEach(side => {
          const name = m[side];
          const entry = PLAYER_HCP[safeKey(name)];
          const hcp = entry ? entry.hcp : null;
          const strokesArr = holes.map(h => side==='a' ? h.strokesA : h.strokesB);
          const res = computeStableford(strokesArr, COURSE_DATA.riedhof, hcp);
          const diff = computeScoreDifferential(strokesArr, COURSE_DATA.riedhof, hcp);
          const team = side === 'a' ? TEAM_A : TEAM_B;
          rows.push({name, team, hcp, brutto: res.brutto, netto: res.netto, holesCounted: res.holesCounted, diff});
        });
      });
    }
    return rows;
  }

  // ---------- realtime listeners (push updates, no polling needed) ----------
  function onDay1Change(snap){
    DAY1 = snap.exists() ? snap.val() : null;
    LAST_SYNC = Date.now();
    if (VIEW.name === 'scoreboard' || VIEW.name === 'match' || VIEW.name === 'public') render();
  }
  function onDay2Change(snap){
    DAY2 = snap.exists() ? snap.val() : null;
    LAST_SYNC = Date.now();
    if (VIEW.name === 'scoreboard' || VIEW.name === 'match' || VIEW.name === 'public') render();
  }
  function onResultsChange(snap){
    const blob = snap.exists() ? snap.val() : {};
    allMatchIds().forEach(id => { MATCHES[id] = blob[id] || {holes:[], pending:{}}; });
    LAST_SYNC = Date.now();
    if (VIEW.name === 'scoreboard' || VIEW.name === 'match' || VIEW.name === 'public') render();
  }
  function onConnectionChange(snap){
    IS_ONLINE = snap.val() === true;
    if (VIEW.name !== 'login' && VIEW.name !== 'loading') render();
  }
  function attachConnectionListener(){
    db.ref('.info/connected').on('value', onConnectionChange);
  }

  function onPlayerHcpChange(snap){
    PLAYER_HCP = snap.exists() ? snap.val() : {};
    if (VIEW.name === 'scoreboard' || VIEW.name === 'stableford') render();
  }
  function attachRealtimeListeners(){
    db.ref('day1_pairings').on('value', onDay1Change, e => applyError(e, 'Live-Verbindung unterbrochen.'));
    db.ref('day2_pairings').on('value', onDay2Change, e => applyError(e, 'Live-Verbindung unterbrochen.'));
    db.ref('results').on('value', onResultsChange, e => applyError(e, 'Live-Verbindung unterbrochen.'));
    db.ref('player_hcp').on('value', onPlayerHcpChange, e => applyError(e, 'Live-Verbindung unterbrochen.'));

  // ---------- matchplay scoring ----------
  function computeStatus(holes){
    holes = holes || [];
    let a=0, b=0;
    let decidedAt = null; // hole count at which the match became mathematically unwinnable for the trailing side
    let decidedWinner = null, decidedMargin = 0;
    for (let i=0; i<holes.length; i++){
      const h = holes[i];
      if (h.strokesA < h.strokesB) a++;
      else if (h.strokesA > h.strokesB) b++;
      if (decidedAt === null){
        const playedSoFar = i+1;
        const leadSoFar = a-b;
        const remainingSoFar = 18 - playedSoFar;
        if (Math.abs(leadSoFar) > remainingSoFar){
          decidedAt = playedSoFar;
          decidedWinner = leadSoFar>0 ? 'A':'B';
          decidedMargin = Math.abs(leadSoFar);
        }
      }
    }
    const played = holes.length;
    const lead = a - b;
    let finished=false, winner=null, label='';
    if (decidedAt !== null){
      // Clinched early — result is locked in even if more holes get played afterward for fun.
      finished = true; winner = decidedWinner;
      label = decidedMargin + '&' + (18 - decidedAt);
    } else if (played >= 18){
      finished = true;
      if (lead === 0){ label = 'AS'; winner = null; }
      else { winner = lead>0?'A':'B'; label = Math.abs(lead) + ' UP'; }
    } else if (played === 0){
      label = 'Noch nicht gestartet';
    } else {
      label = lead === 0 ? ('AS nach Loch ' + played) : (Math.abs(lead) + ' UP nach Loch ' + played);
    }
    let pointsA=0, pointsB=0;
    if (finished){
      if (winner==='A') pointsA = 1;
      else if (winner==='B') pointsB = 1;
      else { pointsA = 0.5; pointsB = 0.5; }
    }
    return {a,b,played,lead,finished,winner,label,pointsA,pointsB,decidedAt};
  }

  function tallyFor(ids){
    let pointsA=0, pointsB=0, decided=0;
    ids.forEach(id => {
      const st = computeStatus((MATCHES[id]||{}).holes);
      pointsA += st.pointsA; pointsB += st.pointsB;
      if (st.finished) decided++;
    });
    return {pointsA, pointsB, total: ids.length, decided};
  }
  function tally(){
    return tallyFor(allMatchIds());
  }

  function sideNames(m, day, side){
    const v = m[side];
    return Array.isArray(v) ? v : [v];
  }
  function matchParticipants(m, day){
    return [...sideNames(m, day, 'a'), ...sideNames(m, day, 'b')];
  }
  function findMatchAndDay(id){
    if (DAY1){ const m = DAY1.find(x=>x.id===id); if (m) return {m, day:1}; }
    if (DAY2){ const m = DAY2.find(x=>x.id===id); if (m) return {m, day:2}; }
    return {m:null, day:null};
  }

  function popupSectionTableHtml(course, strokesArr, startHole, count, subLabel, nextHoleIdx){
    const idxs = Array.from({length:count}, (_,i) => startHole + i);
    const headCells = idxs.map(i => `<th class="${i===nextHoleIdx?'nx':''}">${i+1}</th>`).join('');
    let rows = '';
    if (course && course.holes){
      const parVals = idxs.map(i => course.holes[i].par);
      const hcpVals = idxs.map(i => course.holes[i].hcp);
      const parSum = parVals.reduce((a,b)=>a+parseInt(b,10),0);
      rows += `<tr><th class="rl">Par</th>${idxs.map(i=>`<td class="${i===nextHoleIdx?'nx':''}">${course.holes[i].par}</td>`).join('')}<th class="tot">${parSum}</th></tr>`;
      rows += `<tr><th class="rl">HCP</th>${idxs.map(i=>`<td class="${i===nextHoleIdx?'nx':''}">${course.holes[i].hcp}</td>`).join('')}<th class="tot">–</th></tr>`;
    }
    const strokeVals = idxs.map(i => strokesArr[i]);
    const playedVals = strokeVals.filter(v => v != null);
    const strokeSum = playedVals.length ? playedVals.reduce((a,b)=>a+b,0) : null;
    const parByHole = (course && course.holes) ? course.holes.map(h => h.par) : null;
    const strokeCells = idxs.map(i => {
      const val = strokesArr[i];
      let cls = i===nextHoleIdx ? 'nx' : '';
      if (val != null && parByHole){
        const par = parByHole[i];
        if (val < par) cls += ' under-par';
        else if (val > par) cls += ' over-par';
      }
      return `<td class="${cls}">${val!=null?val:'–'}</td>`;
    }).join('');
    rows += `<tr class="strokes-row"><th class="rl">Schl.</th>${strokeCells}<th class="tot">${strokeSum!=null?strokeSum:'–'}</th></tr>`;
    return `<div class="sctab-wrap"><table class="sctab"><tr><th class="rl">Loch</th>${headCells}<th class="tot">${subLabel}</th></tr>${rows}</table></div>`;
  }

</head><body>
  <h1>${esc(label)}</h1>
  <div class="sub">${esc(venue)} · gegen ${esc(opponentNames)}</div>
  ${courseNote}
  ${front}
  ${back}
  ${coursePar!=null ? `<div class="grand-total course-par-line">Platz-Vorgabe (Par gesamt): <strong>${coursePar}</strong></div>` : ''}
  <div class="grand-total">Gesamt bisher: <strong>${total!=null?total:'–'}</strong> Schläge</div>
  <button class="close-btn" onclick="window.close()">Schließen</button>
</body></html>`;
    const win = window.open('', '_blank');
    if (win){ win.document.write(html); win.document.close(); }
    else { alert('Bitte Pop-ups für diese Seite erlauben, um die Scorecard zu öffnen.'); }
  }

  function matchRow(m, day, compact){
    const holes = (MATCHES[m.id] || {}).holes || [];
    const st = computeStatus(holes);
    const isMine = CURRENT_USER && !CURRENT_USER.isAdmin && matchParticipants(m, day).includes(CURRENT_USER.name);

    let centerHtml;
    if (st.lead === 0){
      const compactLabel = st.played === 0 ? '–' : st.label;
      centerHtml = `<div class="mrow-result tied">${esc(compactLabel)}</div>`;
    } else if (st.lead > 0){
      centerHtml = `<img class="mrow-flag" src="${RIEDHOF_FLAG}" alt=""><div class="mrow-result a">${esc(st.label)}</div>`;
    } else {
      centerHtml = `<img class="mrow-flag" src="${BEUERBERG_FLAG}" alt=""><div class="mrow-result b">${esc(st.label)}</div>`;
    }

    return `
      <div class="mrow ${isMine ? 'mine' : ''}" data-open-match="${esc(m.id)}">
        <div class="mrow-name">${isMine && !compact ? '<span class="mrow-mine-tag">DEIN MATCH</span>' : ''}${nameLinesHtml(m, 'a', day)}</div>
        <div class="mrow-center">${centerHtml}</div>
        <div class="mrow-name right">${nameLinesHtml(m, 'b', day)}</div>
      </div>
    `;
  }

  // ---------- MATCH DETAIL ----------
  function strokeButtonsHtml(side){
    let html = '<div class="stroke-grid">';
    for(let n=1;n<=10;n++){
      html += `<button class="stroke-btn" data-stroke-side="${side}" data-stroke-value="${n}">${n}</button>`;
    }
    html += '</div>';
    return html;
  }
  function strokeSideHtml(label, side, value, canEnter, waitingText){
    const cls = side === 'A' ? 'a' : 'b';
    if (value != null){
      return `
        <div class="stroke-block">
          <div class="stroke-block-label ${cls}">${esc(label)}</div>
          <div class="stroke-locked ${cls}">${value}<span>Schläge · eingetragen</span></div>
        </div>`;
    }
    if (canEnter){
      return `
        <div class="stroke-block">
          <div class="stroke-block-label ${cls}">${esc(label)} — Schläge eintragen</div>
          ${strokeButtonsHtml(side)}
        </div>`;
    }
    return `
      <div class="stroke-block">
        <div class="stroke-block-label ${cls}">${esc(label)}</div>
        <div class="stroke-waiting">${esc(waitingText)}</div>
      </div>`;
  }

  function renderMatchDetail(id){
    const {m, day} = findMatchAndDay(id);
    if (!m){ VIEW = {name:'scoreboard'}; render(); return; }
    const matchData = MATCHES[id] || {holes:[], pending:{}};
    const holes = matchData.holes || [];
    const pending = matchData.pending || {};
    const st = computeStatus(holes);
    const nameA = day===1 ? m.a.join(' & ') : m.a;
    const nameB = day===1 ? m.b.join(' & ') : m.b;
    // The OPPONENT enters your strokes — that's who canEnterA/canEnterB checks for.
    const canEnterA = CURRENT_USER.isAdmin || sideNames(m, day, 'b').includes(CURRENT_USER.name);
    const canEnterB = CURRENT_USER.isAdmin || sideNames(m, day, 'a').includes(CURRENT_USER.name);

    const chips = [];
    for(let i=0;i<18;i++){
      if (i < holes.length){
        const h = holes[i];
        const cls = h.strokesA < h.strokesB ? 'a' : h.strokesA > h.strokesB ? 'b' : 'h';
        chips.push(`<div class="hole-chip ${cls}">${i+1}</div>`);
      } else if (i === holes.length && holes.length < 18){
        chips.push(`<div class="hole-chip next">${i+1}</div>`);
      } else {
        chips.push(`<div class="hole-chip">${i+1}</div>`);
      }
    }
    const nextHole = holes.length + 1;

    let bodyHtml = '';
    if (st.finished){
      bodyHtml += `<div class="finished-banner">Match beendet — ${st.winner ? (st.winner==='A'?esc(nameA):esc(nameB)) + ' gewinnt ' + esc(st.label) : 'Unentschieden (halbiert)'}</div>`;
    }
    if (holes.length < 18){
      bodyHtml += `
        ${st.finished ? `<div class="helptext" style="text-align:center; margin-top:10px;">Match ist bereits entschieden — weitere Löcher zählen nur noch für eure Scorecard, nicht mehr fürs Ergebnis.</div>` : ''}
        <div class="entry-title">Loch ${nextHole}</div>
        ${strokeSideHtml(nameA, 'A', pending.strokesA, canEnterA, 'Wartet auf Eintrag durch ' + nameB)}
        ${strokeSideHtml(nameB, 'B', pending.strokesB, canEnterB, 'Wartet auf Eintrag durch ' + nameA)}
        <div class="helptext" style="text-align:center; margin-top:2px;">Der Gegner trägt eure Schläge ein — sobald beide Werte da sind, geht's automatisch zum nächsten Loch.</div>
      `;
    }

    const pendingHasAny = pending.strokesA != null || pending.strokesB != null;
    const adminUndo = CURRENT_USER.isAdmin ? `
      <div class="undo-row">
        ${pendingHasAny ? `<button class="undo-btn" id="btn-undo-pending">Admin: aktuellen Eintrag zurücksetzen</button>` : ''}
        ${holes.length > 0 ? `<button class="undo-btn" id="btn-undo-hole">Admin: letztes Loch rückgängig machen</button>` : ''}
      </div>
    ` : '';

    app.innerHTML += `
      ${topbar()}
      <button class="backlink" id="btn-back-sb">← Zur Übersicht</button>
      <div class="card">
        <div class="match-header">
          <div class="side-name a">${nameLinesHtml(m, 'a', day)}</div>
          <div class="vsline">${day===1 ? ('Zweier-Scramble · ' + esc(DAY1_VENUE)) : ('Einzel · ' + esc(DAY2_VENUE))}</div>
          <div class="side-name b">${nameLinesHtml(m, 'b', day)}</div>
        </div>
        <div class="big-status">${esc(st.label)}</div>
        <div class="hole-strip">${chips.join('')}</div>
        ${bodyHtml}
        ${adminUndo}
      </div>
    `;

    document.getElementById('btn-logout').onclick = logout;
    document.getElementById('btn-back-sb').onclick = () => { VIEW = {name:'scoreboard'}; render(); };
    document.querySelectorAll('[data-stroke-value]').forEach(btn => {
      btn.onclick = () => recordStrokes(id, btn.getAttribute('data-stroke-side'), +btn.getAttribute('data-stroke-value'));
    });
    if (document.getElementById('btn-undo-pending')){
      document.getElementById('btn-undo-pending').onclick = () => undoPending(id);
    }
    if (document.getElementById('btn-undo-hole')){
      document.getElementById('btn-undo-hole').onclick = () => undoLastHole(id);
    }
  }

  async function recordStrokes(id, side, strokes){
    if (SAVING) return;
    setBusy(true);
    try{
      const ref = db.ref('results/' + id);
      const result = await ref.transaction(current => {
        current = current || {};
        const holes = current.holes ? current.holes.slice() : [];
        const pending = current.pending ? {...current.pending} : {};
        if (holes.length >= 18) return; // aborts — all 18 holes already recorded
        pending[side === 'A' ? 'strokesA' : 'strokesB'] = strokes;
        if (pending.strokesA != null && pending.strokesB != null){
          holes.push({strokesA: pending.strokesA, strokesB: pending.strokesB});
          return {holes, pending: {}};
        }
        return {holes, pending};
      });
      if (result.committed && result.snapshot.exists()){
        MATCHES[id] = result.snapshot.val();
      }
    }catch(e){
      applyError(e, 'Konnte Schläge nicht speichern — bitte erneut versuchen.');
    }finally{
      setBusy(false); render();
    }
  }

  async function undoPending(id){
    if (SAVING || !CURRENT_USER.isAdmin) return;
    setBusy(true);
    try{
      const ref = db.ref('results/' + id);
      const result = await ref.transaction(current => {
        current = current || {};
        return {holes: current.holes || [], pending: {}};
      });
      if (result.committed && result.snapshot.exists()) MATCHES[id] = result.snapshot.val();
    }catch(e){
      applyError(e, 'Konnte nicht zurücksetzen.');
    }finally{
      setBusy(false); render();
    }
  }

  async function undoLastHole(id){
    if (SAVING || !CURRENT_USER.isAdmin) return;
    setBusy(true);
    try{
      const ref = db.ref('results/' + id);
      const result = await ref.transaction(current => {
        current = current || {};
        const holes = current.holes ? current.holes.slice() : [];
        if (holes.length === 0) return current;
        holes.pop();
        return {holes, pending: {}};
      });
      if (result.committed && result.snapshot.exists()) MATCHES[id] = result.snapshot.val();
    }catch(e){
      applyError(e, 'Konnte nicht zurücksetzen.');
    }finally{
      setBusy(false); render();
    }
  }

  function setBusy(v){ SAVING = v; }

  // ---------- PUBLIC SCOREBOARD (no login required) ----------

    const t = tally();

    const ticksHtml = Array.from({length: total}).map(()=>`<div class="tick"></div>`).join('');

      ? (DAY1.length ? `<div class="day-table">${DAY1.map(m => matchRow(m, 1)).join('')}</div>` : `<div class="helptext">Keine Matches an Tag 1.</div>`)
      : `<div class="placeholder-card">Die Scramble-Paarungen werden am Vortag ausgelost und hier veröffentlicht.</div>`;
    const day2Html = DAY2
      ? (DAY2.length ? `<div class="day-table">${DAY2.map(m => matchRow(m, 2)).join('')}</div>` : `<div class="helptext">Keine Matches an Tag 2.</div>`)

    app.innerHTML += `
      <div class="topbar">
        <div class="title">${esc(TOURNAMENT_NAME)}</div>
        <div class="live-pill ${IS_ONLINE ? '' : 'offline'}">
          <span class="dot ${IS_ONLINE ? '' : 'offline'}"></span>
          <span>${IS_ONLINE ? 'Live' : 'Offline'}</span>
        </div>
      </div>
      <div class="session-line">
        <span>Öffentlicher Zwischenstand · ohne Login</span>
        <button class="logout-btn" id="btn-public-back">Zum Login</button>
      </div>
      ${masthead('Live Matchplay')}
      <div class="scorecard">
        <div class="scorecard-eyebrow">Gesamtstand</div>
        <div class="score-bar">
          <div class="sb-team a">${esc(TEAM_A.name)}</div>
          <div class="sb-num a">${fmtPoints(t.pointsA)}</div>
          <div class="sb-num">${fmtPoints(t.pointsB)}</div>
          <div class="sb-team b">${esc(TEAM_B.name)}</div>
        </div>
        <div class="tally">
          <div style="position:absolute; left:0; top:0; height:8px; width:${pctA}%; background:${TEAM_A.color}; border-radius:2px 0 0 2px;"></div>
          <div style="position:absolute; right:0; top:0; height:8px; width:${pctB}%; background:${TEAM_B.color}; border-radius:0 2px 2px 0;"></div>

      <div class="day-heading"><h2>Tag 1 · Scramble</h2><span class="sub">${esc(DAY1_VENUE)}${DAY1 ? ', '+DAY1.length+' Matches' : ''}</span></div>

    document.getElementById('btn-public-back').onclick = () => {

  // ---------- STABLEFORD LEADERBOARD (Einzel) ----------
  function renderStableford(){
    const rows = buildStablefordLeaderboard();
    rows.sort((x, y) => {
      if (x.holesCounted === 0 && y.holesCounted === 0) return 0;
      if (x.holesCounted === 0) return 1;
      if (y.holesCounted === 0) return -1;
      return (y.netto - x.netto) || (y.brutto - x.brutto);
    });

    const rowsHtml = rows.map((r, idx) => `
      <div class="stf-row">
        <div class="stf-rank">${r.holesCounted > 0 ? (idx+1) : '–'}</div>
        <div class="stf-name"><span class="stf-team-dot" style="background:${r.team.color}"></span>${esc(r.name)}</div>
        <div class="stf-hcp">${r.hcp != null ? r.hcp : '–'}</div>
        <div class="stf-pts">${r.holesCounted > 0 ? r.brutto : '–'}</div>
        <div class="stf-pts stf-netto">${r.holesCounted > 0 ? (r.hcp != null ? r.netto : '–') : '–'}</div>
        <div class="stf-holes">${r.holesCounted}/18</div>
        <div class="stf-diff">${r.diff != null ? r.diff : '–'}</div>
      </div>
    `).join('');

    app.innerHTML += `
      ${topbar()}
      <button class="backlink" id="btn-back-sb">← Zur Übersicht</button>
      <div class="card">
        <h2 style="margin-bottom:10px;">Stableford-Wertung · Einzel</h2>
        <div class="helptext" style="margin-top:0;">${esc(DAY2_VENUE)} · sortiert nach Netto-Punkten. Wer sein HCP noch nicht eingetragen hat, sieht bei Netto "–".</div>
        <div class="stf-table">
          <div class="stf-row stf-header">
            <div class="stf-rank">#</div>
            <div class="stf-name">Spieler</div>
            <div class="stf-hcp">HCP</div>
            <div class="stf-pts">Brutto</div>
            <div class="stf-pts">Netto</div>
            <div class="stf-holes">Löcher</div>
            <div class="stf-diff">Diff.</div>
          </div>
          ${rowsHtml || '<div class="helptext" style="padding:14px;">Noch keine Einzel-Paarungen ausgelost.</div>'}
        </div>
        <div class="helptext" style="margin-top:12px;">"Diff." ist das Score Differential (WHS-Kennzahl, verfügbar nach 18 gespielten Löchern und eingetragenem HCP) — zeigt, wie platzbereinigt gut die Runde war. Keine offizielle Vorgabe-Änderung, da dieses Turnier kein gemeldetes DGV-Wettspiel ist.</div>
      </div>
    `;
    document.getElementById('btn-logout').onclick = logout;
    document.getElementById('btn-back-sb').onclick = () => { VIEW = {name:'scoreboard'}; render(); };
  }

  // ---------- ADMIN PAIRINGS ----------
  function shuffled(arr){
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function selectOptions(list, selected){
    return list.map(p => `<option value="${esc(p)}" ${p===selected?'selected':''}>${esc(p)}</option>`).join('');
  }

  function usedPlayerSets(draft){
    const usedA = new Set(), usedB = new Set();
    draft.forEach(m => {
      (Array.isArray(m.a) ? m.a : [m.a]).forEach(n => { if (n) usedA.add(n); });
      (Array.isArray(m.b) ? m.b : [m.b]).forEach(n => { if (n) usedB.add(n); });
    });
    return {usedA, usedB};
  }

  function selectOptionsFiltered(roster, used, currentValue){
    let html = `<option value="">– Spieler wählen –</option>`;
    roster.forEach(p => {
      if (!used.has(p) || p === currentValue){
        html += `<option value="${esc(p)}" ${p===currentValue?'selected':''}>${esc(p)}</option>`;
      }
    });
    return html;
  }

  function renderAdminPairings(day){
    if (!CURRENT_USER.isAdmin){ VIEW = {name:'scoreboard'}; render(); return; }
    if (!ADMIN_DRAFT){
      if (day === 1){
        const base = DAY1 || emptyDay1();
        ADMIN_DRAFT = base.map(m => ({id:m.id, a:[...m.a], b:[...m.b]}));
      } else {
        const base = DAY2 || emptyDay2();
        ADMIN_DRAFT = base.map(m => ({id:m.id, a:m.a, b:m.b}));
      }
    }

    const {usedA, usedB} = usedPlayerSets(ADMIN_DRAFT);

    const rowsHtml = day === 1
      ? ADMIN_DRAFT.map((m, idx) => `
          <div class="pairing-row" data-idx="${idx}">
            <div class="pairslot">
              <select data-role="a1">${selectOptionsFiltered(ROSTER_A, usedA, m.a[0])}</select>
              <select data-role="a2">${selectOptionsFiltered(ROSTER_A, usedA, m.a[1])}</select>
            </div>
            <div class="pairing-vs">vs<br><button class="remove-x" data-remove="${idx}">✕</button></div>
            <div class="pairslot">
              <select data-role="b1">${selectOptionsFiltered(ROSTER_B, usedB, m.b[0])}</select>
              <select data-role="b2">${selectOptionsFiltered(ROSTER_B, usedB, m.b[1])}</select>
            </div>
          </div>
        `).join('')
      : ADMIN_DRAFT.map((m, idx) => `
          <div class="pairing-row" data-idx="${idx}">
            <div class="pairslot"><select data-role="a1">${selectOptionsFiltered(ROSTER_A, usedA, m.a)}</select></div>
            <div class="pairing-vs">vs<br><button class="remove-x" data-remove="${idx}">✕</button></div>
            <div class="pairslot"><select data-role="b1">${selectOptionsFiltered(ROSTER_B, usedB, m.b)}</select></div>
          </div>
        `);

    app.innerHTML += `
      ${topbar()}
      <button class="backlink" id="btn-back-sb">← Zur Übersicht</button>
      <div class="card">
        <h2 style="margin-bottom:6px;">${day===1 ? 'Tag 1 · Scramble-Paarungen' : 'Tag 2 · Einzel-Paarungen'}</h2>
        <div class="helptext">${day===1 ? ('Zweier-Team (Riedhof) vs. Zweier-Team (Beuerberg) · Austragungsort: ' + esc(DAY1_VENUE)) : ('1 gegen 1 · Austragungsort: ' + esc(DAY2_VENUE) + ' — wird nach dem Scramble ausgelost.')}</div>
        <div class="warn">Bereits erfasste Ergebnisse bleiben unter der jeweiligen Match-Nummer bestehen, auch wenn du hier Spieler tauschst. Änderungen bitte nur vor Rundenbeginn vornehmen.</div>
        <div id="pairing-rows">${rowsHtml}</div>
        <button class="dice-btn" id="btn-randomize">🎲 Zufällig auslosen</button>
        <div class="helptext" style="margin-top:8px;">Verlost alle Spieler neu zufällig und überschreibt die aktuelle Auswahl.</div>
        <button class="add-row-btn" id="add-row">+ Match hinzufügen</button>
      </div>
      <button class="primary-btn" id="btn-save">Paarungen veröffentlichen</button>
      <button class="secondary-btn" id="btn-cancel">Abbrechen</button>
    `;

    function syncFromDom(){
      document.querySelectorAll('#pairing-rows .pairing-row').forEach((row, i) => {
        if (day === 1){
          ADMIN_DRAFT[i] = {
            id: 'd1-'+(i+1),
            a: [row.querySelector('[data-role=a1]').value, row.querySelector('[data-role=a2]').value],
            b: [row.querySelector('[data-role=b1]').value, row.querySelector('[data-role=b2]').value]
          };
        } else {
          ADMIN_DRAFT[i] = {
            id: 'd2-'+(i+1),
            a: row.querySelector('[data-role=a1]').value,
            b: row.querySelector('[data-role=b1]').value
          };
        }
      });
    }

    document.getElementById('btn-logout').onclick = logout;
    document.getElementById('btn-back-sb').onclick = () => { ADMIN_DRAFT=null; VIEW = {name:'scoreboard'}; render(); };
    document.getElementById('btn-cancel').onclick = () => { ADMIN_DRAFT=null; VIEW = {name:'scoreboard'}; render(); };
    document.querySelectorAll('#pairing-rows select').forEach(sel => {
      sel.onchange = () => { syncFromDom(); render(); };
    });
    document.getElementById('btn-randomize').onclick = () => {
      const shuffledA = shuffled(ROSTER_A);
      const shuffledB = shuffled(ROSTER_B);
      if (day === 1){
        ADMIN_DRAFT = ADMIN_DRAFT.map((m, idx) => ({
          id: m.id,
          a: [shuffledA[idx*2] || '', shuffledA[idx*2+1] || ''],
          b: [shuffledB[idx*2] || '', shuffledB[idx*2+1] || '']
        }));
      } else {
        ADMIN_DRAFT = ADMIN_DRAFT.map((m, idx) => ({
          id: m.id,
          a: shuffledA[idx] || '',
          b: shuffledB[idx] || ''
        }));
      }
      render();
    };
    document.getElementById('add-row').onclick = () => {
      syncFromDom();
      if (day === 1) ADMIN_DRAFT.push({id:'d1-'+(ADMIN_DRAFT.length+1), a:['',''], b:['','']});
      else ADMIN_DRAFT.push({id:'d2-'+(ADMIN_DRAFT.length+1), a:'', b:''});
      render();
    };
    document.querySelectorAll('[data-remove]').forEach(btn => {
      btn.onclick = () => {
        syncFromDom();
        ADMIN_DRAFT.splice(+btn.getAttribute('data-remove'), 1);
        render();
      };
    });
    document.getElementById('btn-save').onclick = async () => {
      syncFromDom();
      const incomplete = ADMIN_DRAFT.some(m => day === 1
        ? (!m.a[0] || !m.a[1] || !m.b[0] || !m.b[1])
        : (!m.a || !m.b));
      if (incomplete){
        ERROR = 'Bitte für jedes Match beide Spieler auswählen, bevor du veröffentlichst.';
        ERROR_DETAIL = null;
        render();
        return;
      }
      try{
        setBusy(true);
        const key = day === 1 ? 'day1_pairings' : 'day2_pairings';
        await savePairings(key, ADMIN_DRAFT);
        if (day === 1) DAY1 = ADMIN_DRAFT; else DAY2 = ADMIN_DRAFT;
        MATCHES = await loadAllMatches();
        LAST_SYNC = Date.now();
        ADMIN_DRAFT = null;
        ERROR = null; ERROR_DETAIL = null;
        VIEW = {name:'scoreboard'};
      }catch(e){
        applyError(e, 'Speichern fehlgeschlagen — deine Eingaben sind noch da, bitte nochmal auf "Paarungen veröffentlichen" tippen.');
      }finally{
        setBusy(false); render();
      }
    };
  }

  function emptyDay1(){
    const rows = [];
    for(let i=0;i<6;i++) rows.push({id:'d1-'+(i+1), a:['',''], b:['','']});
    return rows;
  }
  function emptyDay2(){
    const rows = [];
    for(let i=0;i<12;i++) rows.push({id:'d2-'+(i+1), a:'', b:''});
    return rows;
  }

  // ---------- boot ----------
  async function bootAfterLogin(){
    VIEW = {name:'scoreboard'};
    attachRealtimeListeners();
    render();
  }

  if (!FIREBASE_READY){
    app.innerHTML = `
      <div class="center-note" style="text-align:left; padding:24px 4px;">
        <div class="error-banner">
          Firebase ist noch nicht eingerichtet — die App kann noch nichts speichern oder laden.<br><br>
          Trag im Code oben (Suche nach <code>HIER_EINFÜGEN</code>) die 7 Werte aus eurer Firebase-Projekt-Config ein
          (Firebase Console → Projekteinstellungen → "Meine Apps" → Web-App), speichere die Datei und lade die Seite neu.
        </div>
      </div>
    `;
  } else {
    attachConnectionListener();
    VIEW = {name:'login', step:'name'};
    render();
  }
})();
</script>
</body>
</html>
